<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.3s; }
        .drop-zone.drag-over { border-color: #3b82f6; background: #eff6ff; }
        .toast-slide { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>
    <script>
        const API_BASE = '/api';
        let token = localStorage.getItem('auth_token');
        let currentUser = null;
        let currentPage = 'dashboard';
        let charts = {};
        let selectedFile = null;

        async function apiCall(endpoint, opts={}) {
            const headers = { 'Content-Type': 'application/json', ...opts.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(`${API_BASE}${endpoint}`, { ...opts, headers });
            if (res.status === 401) { logout(); throw new Error('Session expired'); }
            if (!res.ok) throw new Error((await res.json()).detail || 'Request failed');
            return res.json();
        }

        function showToast(msg, type='info') {
            const toast = document.createElement('div');
            const colors = { success:'bg-green-500', error:'bg-red-500', warning:'bg-yellow-500', info:'bg-blue-500' };
            const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
            toast.className = `fixed bottom-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 toast-slide`;
            toast.innerHTML = `<div class="flex items-center gap-3"><i class="fas ${icons[type]}"></i><span>${msg}</span></div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function logout() {
            localStorage.removeItem('auth_token');
            token = null;
            window.location.href = 'login.html';
        }

        async function loadUser() {
            try {
                currentUser = await apiCall('/auth/me');
                renderApp();
                loadDashboard();
            } catch(e) { logout(); }
        }

        function navigateTo(page) {
            currentPage = page;
            renderApp();
            setTimeout(() => {
                if (page === 'dashboard') loadDashboard();
                else if (page === 'documents') loadDocuments();
                else if (page === 'upload') initUpload();
                else if (page === 'approvals') loadApprovals();
                else if (page === 'reports') loadSpendReport();
                else if (page === 'tax-report') loadTaxReport();
                else if (page === 'analytics') loadAnalytics();
                else if (page === 'admin-users') loadUsers();
                else if (page === 'admin-audit') loadAuditLogs();
            }, 100);
        }

        function renderApp() {
            if (!currentUser) return;
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen flex">
                    <aside class="w-64 bg-white shadow-lg fixed h-full overflow-y-auto">
                        <div class="p-6 border-b"><h1 class="text-xl font-bold"><i class="fas fa-file-alt text-blue-600 mr-2"></i>DocManager</h1><p class="text-sm text-gray-500">${currentUser.full_name} (Admin)</p></div>
                        <nav class="p-4">
                            <button onclick="navigateTo('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg ${currentPage==='dashboard'?'bg-blue-50 text-blue-700':'hover:bg-gray-50'}"><i class="fas fa-chart-line w-5"></i>Dashboard</button>
                            <button onclick="navigateTo('documents')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg ${currentPage==='documents'?'bg-blue-50 text-blue-700':'hover:bg-gray-50'}"><i class="fas fa-file-alt w-5"></i>Documents</button>
                            <button onclick="navigateTo('upload')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg ${currentPage==='upload'?'bg-blue-50 text-blue-700':'hover:bg-gray-50'}"><i class="fas fa-upload w-5"></i>Upload</button>
                            <button onclick="navigateTo('approvals')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg ${currentPage==='approvals'?'bg-blue-50 text-blue-700':'hover:bg-gray-50'}"><i class="fas fa-check-circle w-5"></i>Pending (L3)</button>
                            <button onclick="navigateTo('reports')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg ${currentPage==='reports'?'bg-blue-50 text-blue-700':'hover:bg-gray-50'}"><i class="fas fa-chart-bar w-5"></i>Spend Report</button>
                            <button onclick="navigateTo('tax-report')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg ${currentPage==='tax-report'?'bg-blue-50 text-blue-700':'hover:bg-gray-50'}"><i class="fas fa-percent w-5"></i>Tax Report</button>
                            <button onclick="navigateTo('analytics')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg ${currentPage==='analytics'?'bg-blue-50 text-blue-700':'hover:bg-gray-50'}"><i class="fas fa-brain w-5"></i>Analytics</button>
                            <button onclick="navigateTo('admin-users')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg ${currentPage==='admin-users'?'bg-blue-50 text-blue-700':'hover:bg-gray-50'}"><i class="fas fa-users w-5"></i>User Management</button>
                            <button onclick="navigateTo('admin-audit')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg ${currentPage==='admin-audit'?'bg-blue-50 text-blue-700':'hover:bg-gray-50'}"><i class="fas fa-history w-5"></i>Audit Logs</button>
                        </nav>
                        <div class="absolute bottom-0 p-4 border-t w-full"><button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg"><i class="fas fa-sign-out-alt"></i>Logout</button></div>
                    </aside>
                    <main class="ml-64 flex-1 p-8">${renderContent()}</main>
                </div>
            `;
        }

        function renderContent() {
            const pages = {
                dashboard: '<div><h1 class="text-2xl font-bold mb-6">Dashboard</h1><div id="dashboardContent"><div class="loader mx-auto"></div></div></div>',
                documents: '<div><div class="flex justify-between items-center mb-6"><h1 class="text-2xl font-bold">Documents</h1><select id="statusFilter" onchange="loadDocuments()" class="border rounded-lg p-2"><option value="">All</option><option value="pending_level1">Pending L1</option><option value="pending_level2">Pending L2</option><option value="pending_level3">Pending L3</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select><button onclick="navigateTo(\'upload\')" class="bg-blue-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-upload mr-2"></i>Upload</button></div><div id="documentsList"><div class="loader mx-auto"></div></div></div>',
                upload: '<div><h1 class="text-2xl font-bold mb-6">Upload Document</h1><div class="bg-white rounded-xl p-6"><form id="uploadForm" onsubmit="handleUpload(event)"><div class="mb-4"><label>Document Type</label><select id="docType" class="w-full border rounded-lg p-2" required><option value="invoice">Invoice</option><option value="credit_note">Credit Note</option></select></div><div class="mb-4"><label>File</label><div id="dropZone" class="drop-zone border-2 rounded-lg p-8 text-center cursor-pointer" onclick="document.getElementById(\'fileInput\').click()" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)"><i class="fas fa-cloud-upload-alt text-4xl text-gray-400"></i><p>Drag & drop or click</p><input type="file" id="fileInput" class="hidden" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFileSelect(event)"></div><div id="selectedFile" class="hidden mt-3"><div class="flex justify-between bg-gray-50 p-3 rounded"><span id="fileName"></span><button type="button" onclick="clearFile()" class="text-red-500"><i class="fas fa-times"></i></button></div></div></div><button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg">Upload</button></form></div></div>',
                approvals: '<div><h1 class="text-2xl font-bold mb-6">Pending Level‑3 Approvals</h1><div id="approvalsList"><div class="loader mx-auto"></div></div></div>',
                reports: `
                    <div><h1 class="text-2xl font-bold mb-6">Spend Report</h1>
                    <div class="bg-white p-6 rounded-xl mb-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <input type="date" id="repStart" class="border p-2 rounded" placeholder="Start Date">
                            <input type="date" id="repEnd" class="border p-2 rounded" placeholder="End Date">
                            <input type="text" id="repVendor" placeholder="Vendor Name" class="border p-2 rounded">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <select id="repStatus" class="border p-2 rounded"><option value="">All Statuses</option><option value="approved">Approved</option><option value="rejected">Rejected</option><option value="pending_level1">Pending L1</option><option value="pending_level2">Pending L2</option><option value="pending_level3">Pending L3</option></select>
                            <input type="number" id="repMinAmount" placeholder="Min Amount" class="border p-2 rounded">
                            <input type="number" id="repMaxAmount" placeholder="Max Amount" class="border p-2 rounded">
                        </div>
                        <div class="mt-4 flex gap-3">
                            <button onclick="loadSpendReport()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Generate</button>
                            <button onclick="exportExcel()" class="bg-green-600 text-white px-4 py-2 rounded-lg">Excel</button>
                            <button onclick="exportPDF()" class="bg-red-600 text-white px-4 py-2 rounded-lg">PDF</button>
                        </div>
                    </div>
                    <div id="reportResults"><div class="loader mx-auto"></div></div></div>
                `,
                'tax-report': `
                    <div><h1 class="text-2xl font-bold mb-6">Tax / VAT Report</h1>
                    <div class="bg-white p-6 rounded-xl mb-6">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="date" id="taxStart" class="border p-2 rounded" placeholder="Start Date">
                            <input type="date" id="taxEnd" class="border p-2 rounded" placeholder="End Date">
                        </div>
                        <div class="mt-4 flex gap-3">
                            <button onclick="loadTaxReport()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Generate</button>
                            <button onclick="exportTaxExcel()" class="bg-green-600 text-white px-4 py-2 rounded-lg">Excel</button>
                            <button onclick="exportTaxPDF()" class="bg-red-600 text-white px-4 py-2 rounded-lg">PDF</button>
                        </div>
                    </div>
                    <div id="taxResults"><div class="loader mx-auto"></div></div></div>
                `,
                analytics: '<div><h1 class="text-2xl font-bold mb-6">AI Analytics</h1><div class="grid grid-cols-2 gap-6"><div id="insightsPanel" class="bg-white p-6 rounded-xl"><div class="loader mx-auto"></div></div><div id="forecastPanel" class="bg-white p-6 rounded-xl"><div class="loader mx-auto"></div></div></div></div>',
                'admin-users': '<div><h1 class="text-2xl font-bold mb-6">User Management</h1><div class="bg-white rounded-xl p-6 mb-6"><h2 class="text-lg font-semibold mb-4">Create New User</h2><form id="createUserForm" onsubmit="handleCreateUser(event)"><div class="grid grid-cols-2 gap-4"><input type="text" id="newUsername" placeholder="Username" class="border p-2 rounded" required><input type="email" id="newEmail" placeholder="Email" class="border p-2 rounded" required><input type="text" id="newFullName" placeholder="Full Name" class="border p-2 rounded" required><input type="password" id="newPassword" placeholder="Password" class="border p-2 rounded" required><select id="newRole" class="border p-2 rounded"><option value="viewer">Viewer</option><option value="approver">Approver</option><option value="manager">Manager</option><option value="admin">Admin</option></select><button type="submit" class="bg-blue-600 text-white py-2 rounded-lg">Create User</button></div></form></div><div class="bg-white rounded-xl p-6"><h2 class="text-lg font-semibold mb-4">All Users</h2><div id="usersList"><div class="loader mx-auto"></div></div></div></div>',
                'admin-audit': '<div><h1 class="text-2xl font-bold mb-6">Audit Logs</h1><div class="bg-white rounded-xl p-6"><div id="auditLogsList"><div class="loader mx-auto"></div></div></div></div>'
            };
            return pages[currentPage];
        }

        // ==================== DASHBOARD ====================
        async function loadDashboard() {
            const container = document.getElementById('dashboardContent');
            if (!container) return;
            try {
                const stats = await apiCall('/reports/spend-summary', { method: 'POST', body: JSON.stringify({}) });
                const pending = await apiCall('/approval/pending');
                const insights = await apiCall('/analytics/insights');
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-blue-500"><div class="flex justify-between"><div><p class="text-gray-500 text-sm">Total Spend</p><p class="text-2xl font-bold">$${(stats.summary?.total_amount || 0).toLocaleString()}</p></div><div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center"><i class="fas fa-dollar-sign text-blue-600 text-xl"></i></div></div></div>
                        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-green-500"><div><p class="text-gray-500 text-sm">Documents</p><p class="text-2xl font-bold">${stats.summary?.document_count || 0}</p></div></div>
                        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-purple-500"><div><p class="text-gray-500 text-sm">Vendors</p><p class="text-2xl font-bold">${stats.summary?.unique_vendors || 0}</p></div></div>
                        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-orange-500"><div><p class="text-gray-500 text-sm">Pending Approvals</p><p class="text-2xl font-bold">${pending.length}</p></div></div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                        <div class="bg-white rounded-xl shadow-sm p-6"><h2 class="text-lg font-semibold mb-4">Status Overview</h2><div class="grid grid-cols-5 gap-2">${renderStatusCards(stats.status_overview)}</div></div>
                        <div class="bg-white rounded-xl shadow-sm p-6"><h2 class="text-lg font-semibold mb-4">AI Insights</h2><ul class="space-y-2">${(insights.insights || []).map(i => `<li class="text-sm text-gray-700"><i class="fas fa-lightbulb text-yellow-500 mr-2"></i>${i}</li>`).join('')}</ul></div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6"><h2 class="text-lg font-semibold mb-4">Top Vendors by Spend</h2><div class="space-y-3">${renderVendorList(stats.vendor_breakdown)}</div></div>
                `;
            } catch (error) { container.innerHTML = `<div class="text-red-600">Error: ${error.message}</div>`; }
        }

        function renderStatusCards(status) {
            if (!status) return '<div class="col-span-5 text-center">No data</div>';
            const items = [
                { key: 'pending_level1', label: 'L1', color: 'yellow' }, { key: 'pending_level2', label: 'L2', color: 'orange' },
                { key: 'pending_level3', label: 'L3', color: 'red' }, { key: 'approved', label: 'Approved', color: 'green' },
                { key: 'rejected', label: 'Rejected', color: 'gray' }
            ];
            return items.map(s => `<div class="text-center p-2 bg-${s.color}-50 rounded"><p class="text-xl font-bold text-${s.color}-600">${status[s.key] || 0}</p><p class="text-xs">${s.label}</p></div>`).join('');
        }

        function renderVendorList(vendors) {
            if (!vendors || Object.keys(vendors).length === 0) return '<div class="text-center text-gray-500">No vendor data</div>';
            const sorted = Object.entries(vendors).sort((a,b)=>b[1]-a[1]).slice(0,10);
            const max = sorted[0]?.[1] || 1;
            return sorted.map(([name, amt]) => `<div><div class="flex justify-between text-sm"><span>${name}</span><span>$${amt.toLocaleString()}</span></div><div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-blue-600 h-2 rounded-full" style="width:${(amt/max*100)}%"></div></div></div>`).join('');
        }

        // ==================== DOCUMENTS ====================
        async function loadDocuments() {
            const container = document.getElementById('documentsList');
            if (!container) return;
            const status = document.getElementById('statusFilter')?.value || '';
            try {
                const docs = await apiCall(`/documents?skip=0&limit=100${status ? `&status_filter=${status}` : ''}`);
                if (docs.length === 0) {
                    container.innerHTML = `<div class="bg-white rounded-xl p-12 text-center"><i class="fas fa-folder-open text-5xl text-gray-300"></i><p class="text-gray-500 mt-2">No documents found</p><button onclick="navigateTo('upload')" class="mt-4 text-blue-600">Upload first document</button></div>`;
                    return;
                }
                container.innerHTML = `<div class="bg-white rounded-xl shadow-sm overflow-hidden"><table class="w-full"><thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left">ID</th><th>Filename</th><th>Vendor</th><th>Amount</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>${docs.map(d => `<tr class="hover:bg-gray-50"><td class="px-6 py-4">${d.id}</td><td>${d.filename.substring(0,40)}</td><td>${d.vendor_name || '—'}</td><td class="font-semibold">$${(d.amount||0).toLocaleString()}</td><td>${getStatusBadge(d.status)}</td><td>${new Date(d.upload_date).toLocaleDateString()}</td><td><button onclick="viewDocument(${d.id})" class="text-blue-600"><i class="fas fa-eye"></i></button></td></tr>`).join('')}</tbody></table></div>`;
            } catch (error) { container.innerHTML = `<div class="text-red-600">Error: ${error.message}</div>`; }
        }

        function getStatusBadge(status) {
            const map = { pending_level1:'Pending L1', pending_level2:'Pending L2', pending_level3:'Pending L3', approved:'Approved', rejected:'Rejected' };
            const color = { pending_level1:'yellow', pending_level2:'orange', pending_level3:'red', approved:'green', rejected:'gray' }[status];
            return `<span class="px-2 py-1 text-xs rounded-full bg-${color}-100 text-${color}-700">${map[status]||status}</span>`;
        }

        async function viewDocument(id) {
            try {
                const data = await apiCall(`/documents/${id}`);
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
                modal.innerHTML = `<div class="bg-white rounded-xl shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto"><div class="p-6 border-b flex justify-between"><h2 class="text-xl font-bold">Document Details</h2><button onclick="this.closest('.fixed').remove()"><i class="fas fa-times text-xl"></i></button></div><div class="p-6"><div class="grid grid-cols-2 gap-4"><div><label class="text-sm text-gray-500">Filename</label><p>${data.document.filename}</p></div><div><label>Type</label><p class="capitalize">${data.document.document_type}</p></div><div><label>Vendor</label><p>${data.document.vendor_name || '—'}</p></div><div><label>Invoice #</label><p>${data.document.invoice_number || '—'}</p></div><div><label>Date</label><p>${data.document.invoice_date ? new Date(data.document.invoice_date).toLocaleDateString() : '—'}</p></div><div><label>Amount</label><p class="text-lg text-blue-600">$${(data.document.amount||0).toLocaleString()}</p></div><div><label>VAT</label><p>$${(data.document.vat_amount||0).toLocaleString()}</p></div><div><label>Status</label>${getStatusBadge(data.document.status)}</div></div>${data.document.is_duplicate ? `<div class="mt-4 bg-yellow-50 p-3 rounded"><i class="fas fa-exclamation-triangle text-yellow-600"></i> ${data.document.duplicate_reason}</div>` : ''}${data.approval_history.length ? `<div class="mt-6"><h3 class="font-semibold">Approval History</h3>${data.approval_history.map(a => `<div class="flex gap-2 text-sm p-2 bg-gray-50 mt-1"><span class="font-bold">Level ${a.level}:</span> ${a.decision} - ${a.comments || 'no comments'}</div>`).join('')}</div>` : ''}</div><div class="p-6 border-t bg-gray-50 flex justify-end"><button onclick="this.closest('.fixed').remove()" class="px-4 py-2 bg-gray-200 rounded-lg">Close</button></div></div>`;
                document.body.appendChild(modal);
            } catch (error) { showToast(error.message, 'error'); }
        }

        // ==================== UPLOAD ====================
        function initUpload() { selectedFile = null; }
        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function handleDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if (e.dataTransfer.files.length) { selectedFile = e.dataTransfer.files[0]; updateFileDisplay(); } }
        function handleFileSelect(e) { if (e.target.files.length) { selectedFile = e.target.files[0]; updateFileDisplay(); } }
        function updateFileDisplay() { if (selectedFile) { document.getElementById('selectedFile').classList.remove('hidden'); document.getElementById('fileName').textContent = selectedFile.name; } }
        function clearFile() { selectedFile = null; document.getElementById('selectedFile').classList.add('hidden'); document.getElementById('fileInput').value = ''; }
        async function handleUpload(e) {
            e.preventDefault();
            if (!selectedFile) { showToast('Please select a file', 'error'); return; }
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('document_type', document.getElementById('docType').value);
            try {
                showToast('Uploading...', 'info');
                const res = await fetch(`${API_BASE}/documents/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                if (!res.ok) throw new Error((await res.json()).detail);
                const data = await res.json();
                showToast(`Uploaded! ID: ${data.document_id}${data.is_duplicate ? ' (duplicate)' : ''}`, data.is_duplicate ? 'warning' : 'success');
                clearFile();
                document.getElementById('uploadForm').reset();
                setTimeout(() => navigateTo('documents'), 1500);
            } catch (err) { showToast(err.message, 'error'); }
        }

        // ==================== APPROVALS ====================
        async function loadApprovals() {
            const container = document.getElementById('approvalsList');
            if (!container) return;
            try {
                const approvals = await apiCall('/approval/pending');
                if (approvals.length === 0) { container.innerHTML = `<div class="bg-white rounded-xl p-12 text-center"><i class="fas fa-check-circle text-5xl text-green-300"></i><p class="text-gray-500">No pending approvals</p></div>`; return; }
                container.innerHTML = `<div class="grid gap-6">${approvals.map(d => `
                    <div class="bg-white rounded-xl shadow-sm p-6"><div class="flex justify-between"><div><h3 class="font-semibold">${d.filename}</h3><p class="text-sm text-gray-500">${getStatusBadge(d.status)}</p></div><div class="text-right"><p class="text-2xl font-bold text-blue-600">$${(d.amount||0).toLocaleString()}</p><p class="text-gray-500 text-sm">${d.vendor_name || 'Unknown'}</p></div></div><div class="border-t pt-4 mt-4 flex gap-3"><button onclick="showApprovalModal(${d.id},'approved')" class="flex-1 bg-green-600 text-white py-2 rounded-lg">Approve</button><button onclick="showApprovalModal(${d.id},'rejected')" class="flex-1 bg-red-600 text-white py-2 rounded-lg">Reject</button><button onclick="viewDocument(${d.id})" class="px-4 py-2 border rounded-lg">View</button></div></div>
                `).join('')}</div>`;
            } catch (error) { container.innerHTML = `<div class="text-red-600">Error: ${error.message}</div>`; }
        }

        function showApprovalModal(docId, decision) {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
            modal.innerHTML = `<div class="bg-white rounded-xl max-w-md w-full"><div class="p-6 border-b"><h2 class="text-xl font-bold">${decision === 'approved' ? 'Approve' : 'Reject'} Document</h2></div><div class="p-6"><textarea id="approvalComments" rows="3" class="w-full border rounded-lg p-2" placeholder="Comments (optional)"></textarea></div><div class="p-6 border-t bg-gray-50 flex justify-end gap-3"><button onclick="this.closest('.fixed').remove()" class="px-4 py-2 bg-gray-200 rounded-lg">Cancel</button><button onclick="submitApproval(${docId},'${decision}')" class="px-4 py-2 ${decision==='approved'?'bg-green-600':'bg-red-600'} text-white rounded-lg">Confirm</button></div></div>`;
            document.body.appendChild(modal);
        }

        async function submitApproval(docId, decision) {
            const comments = document.getElementById('approvalComments')?.value || '';
            try {
                const result = await apiCall('/approval/process', { method: 'POST', body: JSON.stringify({ document_id: docId, decision, comments }) });
                showToast(result.message, 'success');
                document.querySelector('.fixed')?.remove();
                loadApprovals();
                if (currentPage === 'dashboard') loadDashboard();
            } catch (error) { showToast(error.message, 'error'); }
        }

        // ==================== SPEND REPORT ====================
        async function loadSpendReport() {
            const container = document.getElementById('reportResults');
            if (!container) return;
            const filters = {};
            if (document.getElementById('repStart')?.value) filters.start_date = document.getElementById('repStart').value;
            if (document.getElementById('repEnd')?.value) filters.end_date = document.getElementById('repEnd').value;
            if (document.getElementById('repVendor')?.value) filters.vendor_name = document.getElementById('repVendor').value;
            if (document.getElementById('repStatus')?.value) filters.status = document.getElementById('repStatus').value;
            if (document.getElementById('repMinAmount')?.value) filters.min_amount = parseFloat(document.getElementById('repMinAmount').value);
            if (document.getElementById('repMaxAmount')?.value) filters.max_amount = parseFloat(document.getElementById('repMaxAmount').value);
            try {
                const data = await apiCall('/reports/spend-summary', { method: 'POST', body: JSON.stringify(filters) });
                if (data.message) { container.innerHTML = `<div class="bg-white rounded-xl p-12 text-center">${data.message}</div>`; return; }
                container.innerHTML = `
                    <div class="grid grid-cols-4 gap-6 mb-6"><div class="bg-white p-4 rounded-xl">Total Spend<br><span class="text-2xl font-bold">$${(data.summary.total_amount||0).toLocaleString()}</span></div><div class="bg-white p-4 rounded-xl">Total VAT<br><span class="text-2xl">$${(data.summary.total_vat||0).toLocaleString()}</span></div><div class="bg-white p-4 rounded-xl">Documents<br><span class="text-2xl">${data.summary.document_count}</span></div><div class="bg-white p-4 rounded-xl">Vendors<br><span class="text-2xl">${data.summary.unique_vendors}</span></div></div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6"><div class="bg-white p-6 rounded-xl"><canvas id="monthlyChart"></canvas></div><div class="bg-white p-6 rounded-xl"><canvas id="vendorChart"></canvas></div></div>
                    <div class="bg-white rounded-xl overflow-hidden"><table class="w-full"><thead class="bg-gray-50"><tr><th>ID</th><th>Vendor</th><th>Invoice #</th><th>Date</th><th>Amount</th><th>VAT</th></tr></thead><tbody>${(data.documents||[]).map(d => `<tr><td class="p-3">${d.id}</td><td>${d.vendor||'—'}</td><td>${d.invoice_number||'—'}</td><td>${d.date?new Date(d.date).toLocaleDateString():'—'}</td><td>$${(d.amount||0).toLocaleString()}</td><td>$${(d.vat||0).toLocaleString()}</td></tr>`).join('')}</tbody></table></div>
                `;
                if (charts.monthly) charts.monthly.destroy();
                if (charts.vendor) charts.vendor.destroy();
                const ctx1 = document.getElementById('monthlyChart')?.getContext('2d');
                const ctx2 = document.getElementById('vendorChart')?.getContext('2d');
                if (ctx1 && data.monthly_trend) {
                    const months = Object.keys(data.monthly_trend).sort();
                    const values = months.map(m => data.monthly_trend[m]);
                    charts.monthly = new Chart(ctx1, { type: 'line', data: { labels: months, datasets: [{ label: 'Spending ($)', data: values, borderColor: '#3b82f6', fill: true }] } });
                }
                if (ctx2 && data.vendor_breakdown) {
                    const vendors = Object.keys(data.vendor_breakdown).slice(0,8);
                    const amounts = vendors.map(v => data.vendor_breakdown[v]);
                    charts.vendor = new Chart(ctx2, { type: 'bar', data: { labels: vendors, datasets: [{ label: 'Spending ($)', data: amounts, backgroundColor: '#10b981' }] } });
                }
            } catch (error) { container.innerHTML = `<div class="text-red-600">${error.message}</div>`; }
        }

        async function exportExcel() {
            const start = document.getElementById('repStart')?.value || '';
            const end = document.getElementById('repEnd')?.value || '';
            const vendor = document.getElementById('repVendor')?.value || '';
            const status = document.getElementById('repStatus')?.value || '';
            const minAmt = document.getElementById('repMinAmount')?.value || '';
            const maxAmt = document.getElementById('repMaxAmount')?.value || '';
            let url = `/reports/export/excel?${start ? `start_date=${start}&` : ''}${end ? `end_date=${end}&` : ''}${vendor ? `vendor_name=${encodeURIComponent(vendor)}&` : ''}${status ? `status=${status}&` : ''}${minAmt ? `min_amount=${minAmt}&` : ''}${maxAmt ? `max_amount=${maxAmt}` : ''}`;
            window.open(`${API_BASE}${url}`, '_blank');
        }

        async function exportPDF() {
            const start = document.getElementById('repStart')?.value || '';
            const end = document.getElementById('repEnd')?.value || '';
            const vendor = document.getElementById('repVendor')?.value || '';
            const status = document.getElementById('repStatus')?.value || '';
            const minAmt = document.getElementById('repMinAmount')?.value || '';
            const maxAmt = document.getElementById('repMaxAmount')?.value || '';
            let url = `/reports/export/pdf?${start ? `start_date=${start}&` : ''}${end ? `end_date=${end}&` : ''}${vendor ? `vendor_name=${encodeURIComponent(vendor)}&` : ''}${status ? `status=${status}&` : ''}${minAmt ? `min_amount=${minAmt}&` : ''}${maxAmt ? `max_amount=${maxAmt}` : ''}`;
            window.open(`${API_BASE}${url}`, '_blank');
        }

        // ==================== TAX REPORT ====================
        async function loadTaxReport() {
            const container = document.getElementById('taxResults');
            if (!container) return;
            const start = document.getElementById('taxStart')?.value || '';
            const end = document.getElementById('taxEnd')?.value || '';
            let url = `/reports/tax?${start ? `start_date=${start}&` : ''}${end ? `end_date=${end}` : ''}`;
            try {
                const data = await apiCall(url);
                if (data.message) { container.innerHTML = `<div class="bg-white rounded-xl p-12 text-center">${data.message}</div>`; return; }
                container.innerHTML = `
                    <div class="grid grid-cols-3 gap-6 mb-6">
                        <div class="bg-white p-4 rounded-xl">Total Taxable Amount<br><span class="text-2xl font-bold">$${(data.summary.total_taxable_amount||0).toLocaleString()}</span></div>
                        <div class="bg-white p-4 rounded-xl">Total VAT Collected<br><span class="text-2xl">$${(data.summary.total_vat_collected||0).toLocaleString()}</span></div>
                        <div class="bg-white p-4 rounded-xl">Effective Tax Rate<br><span class="text-2xl">${data.summary.effective_tax_rate.toFixed(2)}%</span></div>
                    </div>
                    <div class="bg-white rounded-xl overflow-hidden"><table class="w-full"><thead class="bg-gray-50"><tr><th>ID</th><th>Vendor</th><th>Invoice #</th><th>Date</th><th>Taxable Amount</th><th>VAT Amount</th></tr></thead><tbody>${(data.transactions||[]).map(d => `<tr><td class="p-3">${d.id}</td><td>${d.vendor||'—'}</td><td>${d.invoice_number||'—'}</td><td>${d.date?new Date(d.date).toLocaleDateString():'—'}</td><td>$${(d.taxable_amount||0).toLocaleString()}</td><td>$${(d.vat_amount||0).toLocaleString()}</td></tr>`).join('')}</tbody></table></div>
                `;
            } catch (error) { container.innerHTML = `<div class="text-red-600">${error.message}</div>`; }
        }

        async function exportTaxExcel() {
            const start = document.getElementById('taxStart')?.value || '';
            const end = document.getElementById('taxEnd')?.value || '';
            let url = `/reports/export/tax-excel?${start ? `start_date=${start}&` : ''}${end ? `end_date=${end}` : ''}`;
            window.open(`${API_BASE}${url}`, '_blank');
        }

        async function exportTaxPDF() {
            const start = document.getElementById('taxStart')?.value || '';
            const end = document.getElementById('taxEnd')?.value || '';
            let url = `/reports/export/tax-pdf?${start ? `start_date=${start}&` : ''}${end ? `end_date=${end}` : ''}`;
            window.open(`${API_BASE}${url}`, '_blank');
        }

        // ==================== ANALYTICS ====================
        async function loadAnalytics() {
            const insightsDiv = document.getElementById('insightsPanel');
            const forecastDiv = document.getElementById('forecastPanel');
            if (!insightsDiv || !forecastDiv) return;
            try {
                const insights = await apiCall('/analytics/insights');
                const forecast = await apiCall('/analytics/forecast');
                if (insights.message) insightsDiv.innerHTML = `<div class="text-center text-gray-500">${insights.message}</div>`;
                else insightsDiv.innerHTML = `<h2 class="text-lg font-semibold mb-4"><i class="fas fa-lightbulb text-yellow-500"></i> AI Insights</h2><ul class="space-y-2">${insights.insights.map(i => `<li class="p-2 bg-blue-50 rounded">${i}</li>`).join('')}</ul><div class="mt-6"><h3 class="font-semibold">Statistics</h3><div class="grid grid-cols-2 gap-2 mt-2"><div class="p-2 bg-gray-50 rounded">Total Spend: $${(insights.statistics.total_spending||0).toLocaleString()}</div><div class="p-2 bg-gray-50 rounded">Avg Transaction: $${(insights.statistics.average_transaction||0).toLocaleString()}</div><div class="p-2 bg-gray-50 rounded">Transactions: ${insights.statistics.total_transactions}</div><div class="p-2 bg-gray-50 rounded">Unique Vendors: ${insights.statistics.unique_vendors}</div></div></div>`;
                if (forecast.message) forecastDiv.innerHTML = `<div class="text-center text-gray-500">${forecast.message}</div>`;
                else forecastDiv.innerHTML = `<h2 class="text-lg font-semibold mb-4"><i class="fas fa-chart-line text-purple-500"></i> Spending Forecast</h2><div class="text-center"><p class="text-gray-500">Next Month Forecast</p><p class="text-3xl font-bold text-purple-600">$${forecast.forecast_next_month?.toLocaleString()}</p><p class="text-sm">Confidence: $${forecast.confidence_interval?.lower?.toLocaleString()} – $${forecast.confidence_interval?.upper?.toLocaleString()}</p><div class="mt-4 p-3 bg-blue-50 rounded"><i class="fas fa-info-circle"></i> ${forecast.recommendation}</div></div>`;
            } catch (error) { insightsDiv.innerHTML = `<div class="text-red-600">${error.message}</div>`; forecastDiv.innerHTML = `<div class="text-red-600">${error.message}</div>`; }
        }

        // ==================== ADMIN FUNCTIONS ====================
        async function loadUsers() {
            const container = document.getElementById('usersList');
            if (!container) return;
            try {
                const users = await apiCall('/admin/users');
                container.innerHTML = `<table class="w-full"><thead class="bg-gray-50"><tr><th class="p-3 text-left">ID</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Created</th></tr></thead><tbody>${users.map(u => `<tr><td class="p-3">${u.id}</td><td>${u.username}</td><td>${u.email}</td><td class="capitalize">${u.role}</td><td>${u.is_active ? 'Active' : 'Inactive'}</td><td>${new Date(u.created_at).toLocaleDateString()}</td></tr>`).join('')}</tbody></table>`;
            } catch (error) { container.innerHTML = `<div class="text-red-600">${error.message}</div>`; }
        }

        async function loadAuditLogs() {
            const container = document.getElementById('auditLogsList');
            if (!container) return;
            try {
                const data = await apiCall('/admin/audit-logs?limit=100');
                const logs = data.logs || [];
                if (logs.length === 0) { container.innerHTML = '<div class="text-center text-gray-500">No logs found</div>'; return; }
                container.innerHTML = `<div class="space-y-2 max-h-96 overflow-y-auto">${logs.map(l => `<div class="p-3 bg-gray-50 rounded"><div class="flex justify-between"><span class="font-medium">${l.action}</span><span class="text-xs">${new Date(l.timestamp).toLocaleString()}</span></div><p class="text-xs text-gray-600">${l.details}</p></div>`).join('')}</div>`;
            } catch (error) { container.innerHTML = `<div class="text-red-600">${error.message}</div>`; }
        }

        async function handleCreateUser(e) {
            e.preventDefault();
            const userData = {
                username: document.getElementById('newUsername').value,
                email: document.getElementById('newEmail').value,
                full_name: document.getElementById('newFullName').value,
                password: document.getElementById('newPassword').value,
                role: document.getElementById('newRole').value
            };
            try {
                await apiCall('/admin/users', { method: 'POST', body: JSON.stringify(userData) });
                showToast('User created', 'success');
                document.getElementById('createUserForm').reset();
                loadUsers();
            } catch (error) { showToast(error.message, 'error'); }
        }

        // Expose globals
        window.navigateTo = navigateTo;
        window.loadDocuments = loadDocuments;
        window.viewDocument = viewDocument;
        window.handleUpload = handleUpload;
        window.handleDragOver = handleDragOver;
        window.handleDragLeave = handleDragLeave;
        window.handleDrop = handleDrop;
        window.handleFileSelect = handleFileSelect;
        window.clearFile = clearFile;
        window.loadApprovals = loadApprovals;
        window.showApprovalModal = showApprovalModal;
        window.submitApproval = submitApproval;
        window.loadSpendReport = loadSpendReport;
        window.exportExcel = exportExcel;
        window.exportPDF = exportPDF;
        window.loadTaxReport = loadTaxReport;
        window.exportTaxExcel = exportTaxExcel;
        window.exportTaxPDF = exportTaxPDF;
        window.loadAnalytics = loadAnalytics;
        window.loadUsers = loadUsers;
        window.loadAuditLogs = loadAuditLogs;
        window.handleCreateUser = handleCreateUser;

        loadUser();
    </script>
</body>
</html>
