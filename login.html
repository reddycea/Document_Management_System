<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocManager – Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-file-alt text-3xl text-blue-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Document Management System</h2>
                <p class="text-gray-500 mt-2">Sign in with your role</p>
            </div>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold">Sign In</button>
            </form>
            <div id="loginError" class="mt-4 text-red-600 text-center text-sm hidden"></div>
            <div class="mt-6 pt-6 border-t text-center text-sm text-gray-500">
                <p>Demo Credentials:</p>
                <p>Admin: admin / Admin@123</p>
                <p>Approver: approver / Approver@123</p>
                <p>Manager: manager / Manager@123</p>
                <p>Viewer: viewer / Viewer@123</p>
            </div>
        </div>
    </div>
    <script>
        const API_BASE = '/api';
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (!res.ok) throw new Error('Invalid credentials');
                const data = await res.json();
                localStorage.setItem('auth_token', data.access_token);
                // fetch user role
                const userRes = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${data.access_token}` }
                });
                const user = await userRes.json();
                if (user.role === 'ADMIN') window.location.href = 'admin.html';
                else if (user.role === 'APPROVER') window.location.href = 'approver.html';
                else if (user.role === 'MANAGER') window.location.href = 'manager.html';
                else if (user.role === 'VIEWER') window.location.href = 'viewer.html';
                else throw new Error('Unknown role: ' + user.role);
            } catch (err) {
                const errDiv = document.getElementById('loginError');
                errDiv.textContent = err.message;
                errDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
